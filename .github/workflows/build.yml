# ============================================================================
# Fleen El-Guitar VST3 - CI/CD Workflow
# ============================================================================
# Builds, tests, and releases the plugin on all platforms
# ============================================================================

name: Build and Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_NAME: FleenElGuitar
  VERSION: ${{ github.ref_name }}
  BUILD_TYPE: Release

jobs:
  # ===========================================================================
  # macOS Build
  # ===========================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install cmake ninja
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
            -DJUCE_ENABLE_LTO=ON

      - name: Build Plugin
        run: |
          cmake --build build --config Release --parallel $(sysctl -n hw.ncpu)

      - name: Verify VST3 Bundle
        run: |
          ls -la build/FleenElGuitar_artefacts/Release/VST3/
          codesign --verify build/FleenElGuitar_artefacts/Release/VST3/FleenElGuitar.vst3 || true

      - name: Build Standalone
        run: |
          cmake --build build --config Release --target FleenElGuitar_Standalone

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FleenElGuitar-macOS
          path: |
            build/FleenElGuitar_artefacts/Release/VST3/FleenElGuitar.vst3
            build/FleenElGuitar_artefacts/Release/Standalone/Fleen El-Guitar.app

  # ===========================================================================
  # Windows Build
  # ===========================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build Plugin
        run: |
          cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Verify VST3
        run: |
          dir build\FleenElGuitar_artefacts\Release\VST3\

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FleenElGuitar-Windows
          path: |
            build/FleenElGuitar_artefacts/Release/VST3/FleenElGuitar.vst3
            build/FleenElGuitar_artefacts/Release/Standalone/Fleen El-Guitar.exe

  # ===========================================================================
  # Linux Build
  # ===========================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libasound2-dev \
            libcurl4-openssl-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxinerama-dev \
            libglu1-mesa-dev \
            libfreetype6-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Plugin
        run: |
          cmake --build build --config Release --parallel $(nproc)

      - name: Verify VST3
        run: |
          ls -la build/FleenElGuitar_artefacts/Release/VST3/

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FleenElGuitar-Linux
          path: |
            build/FleenElGuitar_artefacts/Release/VST3/FleenElGuitar.vst3
            build/FleenElGuitar_artefacts/Release/Standalone/FleenElGuitar

  # ===========================================================================
  # Plugin Validation
  # ===========================================================================
  validate:
    name: Validate Plugin
    runs-on: macos-latest
    needs: [build-macos]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: FleenElGuitar-macOS

      - name: Download pluginval
        run: |
          curl -L https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_macOS.zip -o pluginval.zip
          unzip pluginval.zip

      - name: Run pluginval (Level 1)
        run: |
          ./pluginval.app/Contents/MacOS/pluginval --validate "FleenElGuitar.vst3" --level 1

      - name: Run pluginval (Level 2)
        run: |
          ./pluginval.app/Contents/MacOS/pluginval --validate "FleenElGuitar.vst3" --level 2

  # ===========================================================================
  # Create Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux, validate]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package macOS Release
        run: |
          cd artifacts/FleenElGuitar-macOS
          zip -r ../../FleenElGuitar-${{ env.VERSION }}-macOS.zip .

      - name: Package Windows Release
        run: |
          cd artifacts/FleenElGuitar-Windows
          zip -r ../../FleenElGuitar-${{ env.VERSION }}-Windows.zip .

      - name: Package Linux Release
        run: |
          cd artifacts/FleenElGuitar-Linux
          zip -r ../../FleenElGuitar-${{ env.VERSION }}-Linux.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Fleen El-Guitar ${{ env.VERSION }}
          body: |
            ## Changelog
            
            ### New Features
            - Premium skeuomorphic interface with Golden Ratio layout
            - Professional DSP chain (Gain, Drive, EQ, Reverb, Compression)
            - OpenGL-accelerated visualizations
            - JSON-based preset management
            
            ### Technical
            - JUCE 8 framework
            - C++20 implementation
            - Cross-platform support (macOS, Windows, Linux)
            
            ### Installation
            See [documentation](https://github.com/tehuti01/Fleen-el-guitar-vst/tree/main/docs) for detailed installation instructions.
          files: |
            FleenElGuitar-${{ env.VERSION }}-macOS.zip
            FleenElGuitar-${{ env.VERSION }}-Windows.zip
            FleenElGuitar-${{ env.VERSION }}-Linux.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Publish to Homebrew (macOS only)
  # ===========================================================================
  publish-homebrew:
    name: Update Homebrew Formula
    runs-on: macos-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(curl -L "https://github.com/tehuti01/Fleen-el-guitar-vst/archive/refs/tags/${{ env.VERSION }}.tar.gz" | shasum -a 256 | cut -d ' ' -f 1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew Formula
        run: |
          # Update the formula with new version and SHA256
          sed -i '' 's|url ".*"|url "https://github.com/tehuti01/Fleen-el-guitar-vst/archive/refs/tags/${{ env.VERSION }}.tar.gz"|' homebrew/fleen-el-guitar.rb
          sed -i '' 's|sha256 .*|sha256 "${{ steps.sha.outputs.sha256 }}"|' homebrew/fleen-el-guitar.rb
          
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add homebrew/fleen-el-guitar.rb
          git commit -m "chore: update to version ${{ env.VERSION }}" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
